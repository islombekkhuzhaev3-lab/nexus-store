<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Nexus Market | OK Style</title>
    <style>
        /* OK.ru Classic Style */
        body { background: #edeff4; font-family: Tahoma, sans-serif; margin: 0; color: #333; }
        .header { background: #ee8208; color: white; padding: 10px; text-align: center; font-weight: bold; }
        .container { max-width: 900px; margin: auto; display: flex; gap: 20px; padding: 10px; }
        
        /* Chap menyu */
        .sidebar { width: 250px; background: white; padding: 15px; border-radius: 5px; }
        
        /* Asosiy qism */
        .main-content { flex: 1; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 5px; box-shadow: 0 1px 3px #ccc; }
        
        /* AI & Social */
        .widget { background: #f9f9f9; padding: 15px; border: 1px solid #ddd; margin-bottom: 10px; }
        .btn { display: block; padding: 10px; margin: 5px 0; text-align: center; border-radius: 4px; text-decoration: none; font-weight: bold; }
        .tg { background: #0088cc; color: white; }
        .wa { background: #25d366; color: white; }
    </style>
</head>
<body>

<div class="header">NEXUS MARKET - OK STYLE</div>

<div class="container">
    <!-- Chap Menyusi -->
    <div class="sidebar">
        <h3>Profil</h3>
        <p>Islombek Khuzhaev</p>
        <hr>
        <a href="#" class="btn tg">Telegram</a>
        <a href="#" class="btn wa">WhatsApp</a>
    </div>

    <!-- Asosiy Lenta -->
    <div class="main-content">
        <!-- Gemini AI Integratsiya qismi -->
        <div class="card widget">
            <h3>Gemini AI Assistant</h3>
            <input type="text" style="width:80%; padding:5px;" placeholder="Savol bering...">
            <button>Yuborish</button>
        </div>

        <!-- E'lonlar (Somon.tj uslubi) -->
        <div class="card">
            <h3>Mahsulot nomi</h3>
            <p>Narxi: 150 $ | Holati: Yangi</p>
            <button>Batafsil</button>
        </div>
    </div>
</div>

</body>
</html>
