<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Store | Instagram Style</title>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        
        /* Profil qismi */
        .profile { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .avatar { width: 80px; height: 80px; background: #333; border-radius: 50%; }
        .stats { display: flex; gap: 20px; }
        .stat-item { text-align: center; }
        
        /* Postlar (Tovar kartochkalari) */
        .post { background: #121212; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .post-img { width: 100%; height: 300px; background: #222; display: flex; align-items: center; justify-content: center; }
        .post-info { padding: 15px; }
        
        .btn { background: #0095f6; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="profile">
        <div class="avatar"></div>
        <div class="stats">
            <div class="stat-item"><strong>12</strong><br>Post</div>
            <div class="stat-item"><strong>1.2K</strong><br>Obunachi</div>
        </div>
    </div>

    <div id="feed">
        <div class="post">
            <div class="post-img">Mahsulot rasmi</div>
            <div class="post-info">
                <p><strong>Nexus Gadget</strong> - Eng so'nggi texnologiya!</p>
                <button class="btn" onclick="alert('Telegram: @islombek_khuzhaev')">Sotuvchiga yozish</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
